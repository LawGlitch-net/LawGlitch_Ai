<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | LawGlitch</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <!-- Login -->
  <div class="admin-login">
    <form id="admin-login-form" class="admin-login-form text-center">
      <div class="admin-icon"><i class="fas fa-lock"></i></div>
      <h1 class="text-xl font-bold">Admin Access</h1>
      <p class="text-sm text-muted mt-1 mb-6">Enter admin password to continue</p>
      <div class="form-group"><input type="password" class="form-input" placeholder="Password" autofocus /></div>
      <p class="form-error"></p>
      <button type="submit" class="btn btn-default btn-full mt-2">Enter</button>
    </form>
  </div>

  <!-- Dashboard (hidden until login) -->
  <div id="admin-dashboard" style="display:none">
    <div style="max-width:72rem;margin:0 auto;padding:1.5rem 1.5rem 3rem">
      <div class="admin-header">
        <div class="flex items-center gap-4">
          <a href="index.html" class="btn btn-ghost btn-sm">
            <i class="fas fa-arrow-left"></i> Back
          </a>
          <a href="index.html" class="logo" style="font-size: 1.25rem;">
            <span class="logo-bold">Law</span><span class="logo-light">Glitch</span>
          </a>
        </div>
        <div class="flex items-center gap-2">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <i class="fas fa-moon" id="theme-icon"></i>
          </button>
          <button id="admin-refresh" class="btn btn-outline btn-sm">
            <i class="fas fa-sync-alt"></i> Refresh
          </button>
          <button id="admin-export" class="btn btn-outline btn-sm">
            <i class="fas fa-download"></i> Export CSV
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="admin-stats">
        <div class="admin-stat">
          <p class="label">Total Bookings</p>
          <p class="value">0</p>
        </div>
        <div class="admin-stat">
          <p class="label">Pending</p>
          <p class="value">0</p>
        </div>
        <div class="admin-stat">
          <p class="label">Confirmed</p>
          <p class="value">0</p>
        </div>
        <div class="admin-stat">
          <p class="label">Waitlist</p>
          <p class="value">0</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="confirmed">Confirmed</button>
        <button class="filter-btn" data-filter="cancelled">Cancelled</button>
      </div>

      <!-- Table -->
      <div class="card" style="padding:0;overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Company</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookings-tbody">
            <tr>
              <td colspan="6" style="text-align:center;padding:2rem;color:var(--muted-foreground)">Log in to view data
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <!-- Waitlist -->
<div style="margin-top:2rem">
  <h3 style="font-size:1rem;font-weight:600;margin-bottom:1rem">Newsletter Subscribers</h3>
  <div class="card" style="padding:0;overflow-x:auto">
    <table class="data-table">
      <thead>
        <tr>
          <th>Email</th>
          <th>Source</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="waitlist-tbody">
        <tr>
          <td colspan="3" style="text-align:center;padding:2rem;color:var(--muted-foreground)">Log in to view data</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>


</html>
